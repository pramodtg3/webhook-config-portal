<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webhook Configuration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px 0;
        }
        .container {
            background: #6739B7;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        .form-group {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        .form-group label {
            width: 25%;
            float: left;
            margin-bottom: 0;
        }
        .form-group input {
            width: 75%;
            float: right;
            padding: 8px;
            box-sizing: border-box;
            border: none;
            border-radius: 5px;
        }
        .form-group button[type="submit"] {
            width: 30%;
            padding: 10px;
            background: #fff;
            border: none;
            border-radius: 5px;
            color: #6739B7;
            font-size: 16px;
            cursor: pointer;
            transition: .3s linear;
            border: 2px solid;
        }
        .form-group button[type="submit"]:hover {
            background: #6739B7;
            color: #fff;
            transition: .3s linear;
        }
        .form_submit_wrap{
            display: flex;
            justify-content: center;
        }
        .mb-10{
            margin-bottom: 10px;
        }
        .webhook_type_wrap label.form-check-label {
            color: #6739B7;
        }
        .callback_form_container{
            max-width: 50%;
        }
        .client_details_wrap, .webhook_type_wrap, .webhook_config_env_wrap{
            padding: 10px;
            border: 2px solid;
            border-radius: 10px;
        }
        
        /* New Styles for Dynamic Webhooks */
        .webhook-entry {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            position: relative;
        }
        .remove-webhook-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            float: right;
            font-size: 12px;
            margin-top: 5px;
        }
        .add-webhook-btn {
            background: #fff;
            color: #6739B7;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
            display: block;
            width: 100%;
        }

        button.verify-button {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            padding: 5px 10px;
            border-radius: 3px;
            border: 0;
            width: auto;
            background: transparent;
            color: #333; /* Darker color for visibility on white input */
            font-weight: bold;
        }
        button.verify-button:hover{
            color: #6739B7;
        }
        .callback_wrap{
            position: relative;
        }
        @media(max-width: 1200px){
            .callback_form_container {max-width: 85%;}
        }
        @media(max-width: 1600px) and (min-width: 1201px){
            .callback_form_container {max-width: 70%;}
        }
        @media(max-width: 992px){
            .form-group label{width: 40%;}
            .form-group input{width: 60%;}
        }
        @media(max-width: 767px){
            .callback_form_container {max-width: 100%;}
        }
    </style>
</head>
<body>
    <div class="container callback_form_container">
        <h3 class="text-center mb-4">Webhook Configuration Portal</h3>
        <form id="callback_form" method="post">
            
            <div class="client_details_wrap mb-3">
                <h5 class="mb-3">Client Credentials</h5>
                <div class="form-group">
                    <label for="clientId">CLIENT_ID*</label>
                    <input type="text" id="clientId" name="clientId" required placeholder="CLIENT_ID*">
                </div>
                <div class="form-group">
                    <label for="clientSecret">CLIENT_SECRET*</label>
                    <input type="text" id="clientSecret" name="clientSecret" required placeholder="CLIENT_SECRET*">
                </div>
                <div class="form-group">
                    <label for="clientVersion">CLIENT_VERSION*</label>
                    <input type="text" id="clientVersion" name="clientVersion" required placeholder="CLIENT_VERSION*">
                </div>
            </div>

            <div id="webhook_container" class="client_details_wrap mb-3">
                <h5 class="mb-3">Webhook Endpoints</h5>
                
                <div class="webhook-entry">
                    <div class="form-group">
                        <label>USERNAME*</label>
                        <input type="text" class="webhook-username" minlength="5" maxlength="20" required placeholder="USERNAME*">
                    </div>
                    <div class="form-group">
                        <label>PASSWORD*</label>
                        <input type="password" class="webhook-password" minlength="8" maxlength="20" required placeholder="PASSWORD*">
                    </div>
                    <div class="form-group callback_wrap">
                        <label>CALLBACK_URL*</label>
                        <input type="text" class="webhook-url" required placeholder="https://yourdomain.com/webhook">
                        <button type="button" class="verify-button">Verify</button>
                    </div>
                </div>
                
            </div>
            
            <button type="button" id="add_webhook_btn" class="add-webhook-btn">+ Add Another Webhook URL</button>

            <div class="webhook_type_wrap">
                <p class="mb-10 text-center" style="font-size: 1rem;"><strong>WEBHOOK EVENTS TO CONFIGURE</strong></p>
                <p class="text-center"><small><u><b>Note</b></u>: Select at least one event from the below list</small></p>
                <div class="accordion" id="webhooksEventsCollapse">
                  
                  <div class="accordion-item">
                    <h2 class="accordion-header" id="headingOne">
                      <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne" aria-expanded="true" aria-controls="collapseOne">
                        PAY PAGE Events
                      </button>
                    </h2>
                    <div id="collapseOne" class="accordion-collapse collapse show" aria-labelledby="headingOne" data-bs-parent="#webhooksEventsCollapse">
                      <div class="accordion-body">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="webhook_events[]" value="CHECKOUT_ORDER_COMPLETED">
                            <label class="form-check-label">CHECKOUT_ORDER_COMPLETED</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="webhook_events[]" value="CHECKOUT_ORDER_FAILED">
                            <label class="form-check-label">CHECKOUT_ORDER_FAILED</label>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div class="accordion-item">
                    <h2 class="accordion-header" id="headingTwo">
                      <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseTwo" aria-expanded="false" aria-controls="collapseTwo">
                        Custom Checkout Events
                      </button>
                    </h2>
                    <div id="collapseTwo" class="accordion-collapse collapse" aria-labelledby="headingTwo" data-bs-parent="#webhooksEventsCollapse">
                      <div class="accordion-body">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="webhook_events[]" value="PG_ORDER_COMPLETED">
                            <label class="form-check-label">PG_ORDER_COMPLETED</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="webhook_events[]" value="PG_ORDER_FAILED">
                            <label class="form-check-label">PG_ORDER_FAILED</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="webhook_events[]" value="PG_REFUND_ACCEPTED">
                            <label class="form-check-label">PG_REFUND_ACCEPTED</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="webhook_events[]" value="PG_REFUND_COMPLETED">
                            <label class="form-check-label">PG_REFUND_COMPLETED</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="webhook_events[]" value="PG_REFUND_FAILED">
                            <label class="form-check-label">PG_REFUND_FAILED</label>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div class="accordion-item">
                    <h2 class="accordion-header" id="headingThree">
                      <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseThree" aria-expanded="false" aria-controls="collapseThree">
                        Subscription Page Events
                      </button>
                    </h2>
                    <div id="collapseThree" class="accordion-collapse collapse" aria-labelledby="headingThree" data-bs-parent="#webhooksEventsCollapse">
                      <div class="accordion-body">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="webhook_events[]" value="SUBSCRIPTION_SETUP_ORDER_COMPLETED">
                            <label class="form-check-label">SUBSCRIPTION_SETUP_ORDER_COMPLETED</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="webhook_events[]" value="SUBSCRIPTION_SETUP_ORDER_FAILED">
                            <label class="form-check-label">SUBSCRIPTION_SETUP_ORDER_FAILED</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="webhook_events[]" value="SUBSCRIPTION_NOTIFICATION_COMPLETED">
                            <label class="form-check-label">SUBSCRIPTION_NOTIFICATION_COMPLETED</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="webhook_events[]" value="SUBSCRIPTION_NOTIFICATION_FAILED">
                            <label class="form-check-label">SUBSCRIPTION_NOTIFICATION_FAILED</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="webhook_events[]" value="SUBSCRIPTION_REDEMPTION_ORDER_COMPLETED">
                            <label class="form-check-label">SUBSCRIPTION_REDEMPTION_ORDER_COMPLETED</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="webhook_events[]" value="SUBSCRIPTION_REDEMPTION_ORDER_FAILED">
                            <label class="form-check-label">SUBSCRIPTION_REDEMPTION_ORDER_FAILED</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="webhook_events[]" value="SUBSCRIPTION_REDEMPTION_TRANSACTION_COMPLETED">
                            <label class="form-check-label">SUBSCRIPTION_REDEMPTION_TRANSACTION_COMPLETED</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="webhook_events[]" value="SUBSCRIPTION_REDEMPTION_TRANSACTION_FAILED">
                            <label class="form-check-label">SUBSCRIPTION_REDEMPTION_TRANSACTION_FAILED</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="webhook_events[]" value="SUBSCRIPTION_CANCELLED">
                            <label class="form-check-label">SUBSCRIPTION_CANCELLED</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="webhook_events[]" value="SUBSCRIPTION_PAUSED">
                            <label class="form-check-label">SUBSCRIPTION_PAUSED</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="webhook_events[]" value="SUBSCRIPTION_UNPAUSED">
                            <label class="form-check-label">SUBSCRIPTION_UNPAUSED</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="webhook_events[]" value="SUBSCRIPTION_REVOKED">
                            <label class="form-check-label">SUBSCRIPTION_REVOKED</label>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div class="accordion-item">
                    <h2 class="accordion-header" id="headingFour">
                      <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#paylinks" aria-expanded="false" aria-controls="paylinks">
                        PAY Link Events
                      </button>
                    </h2>
                    <div id="paylinks" class="accordion-collapse collapse" aria-labelledby="headingFour" data-bs-parent="#webhooksEventsCollapse">
                      <div class="accordion-body">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="webhook_events[]" value="PAYLINK_ORDER_COMPLETED">
                            <label class="form-check-label">PAYLINK_ORDER_COMPLETED</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="webhook_events[]" value="PAYLINK_ORDER_FAILED">
                            <label class="form-check-label">PAYLINK_ORDER_FAILED</label>
                        </div>
                      </div>
                    </div>
                  </div>

                </div>
            </div> <br>

            <div class="webhook_config_env_wrap">
                <div class="form-radio">
                    <input class="form-check-input" type="radio" value="UAT" id="env" name="env" checked>
                    <label class="form-check-label" for="env">UAT</label>
                </div>
                <div class="form-radio">
                    <input class="form-check-input" type="radio" value="PROD" name="env" id="env1" disabled>
                    <label class="form-check-label" for="env1">Production</label>
                </div>
            </div>
            
            <br>
            <div class="form-group form_submit_wrap">
                <button type="submit">SUBMIT CONFIGURATION</button>
            </div>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>
    
    <script> 
        $(document).ready(function() {
            
            // --- 1. Dynamic Webhook UI Logic ---
            $('#add_webhook_btn').click(function() {
                // Clone the first webhook entry
                var newEntry = $('.webhook-entry:first').clone();
                // Clear the input values
                newEntry.find('input').val('');
                // Add a remove button to the new clone
                newEntry.append('<button type="button" class="remove-webhook-btn">Remove</button>');
                // Append to container
                $('#webhook_container').append(newEntry);
            });

            // Handle removal of dynamic webhook entries
            $(document).on('click', '.remove-webhook-btn', function() {
                $(this).closest('.webhook-entry').remove();
            });

            // --- 2. URL Verification Logic ---
            $(document).on('click', '.verify-button', function(event) {
                // Find the specific URL input associated with the clicked button
                var caUrl = $(this).siblings('.webhook-url').val();

                if (!caUrl || caUrl.length < 5 || !caUrl.startsWith('http')) {
                    alert('Please enter a valid URL starting with http:// or https://');
                    return;
                }

                checkUrlExists(caUrl);
            });

            async function checkUrlExists(url) {
                const dataToPost = { username: 'test', score: 100 };
                try {
                    const checkResponse = await fetch(url, {
                        method: 'HEAD', 
                        mode: 'cors',  
                        cache: 'no-store'
                    });

                    if (checkResponse.ok) {
                        const postResponse = await fetch(url, {
                            method: 'POST',
                            mode: 'cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(dataToPost)
                        });

                        if (postResponse.ok) {
                            Swal.fire({ title: "Success", text: "Valid URL", icon: "success" });
                        } else {
                            Swal.fire({ title: "Failed", text: "URL not accepting the Data", icon: "error" });
                        }
                    } else {
                        console.log(`URL not found or inaccessible. Status: ${checkResponse.status}`);
                    }
                } catch (error) {
                    Swal.fire({ title: "Failed", text: "Network or Cors Error", icon: "error" });
                }
            }

            // --- 3. Form Submission Logic ---
            $('#callback_form').on('submit', function(event) {
                event.preventDefault();
                
                // Get standard inputs
                var clientId = $('#clientId').val();
                var clientSecret = $('#clientSecret').val();
                var clientVersion = $('#clientVersion').val();
                var env = $('input[name="env"]:checked').val();
                
                // Gather Checkboxes
                var webhook_events = [];
                $('input[name="webhook_events[]"]:checked').each(function() {
                    webhook_events.push($(this).val());
                });

                if (webhook_events.length === 0) {
                    Swal.fire({ title: "Error", text: "Please select at least one webhook event.", icon: "error" });
                    return;
                }

                // Dynamically build the webhooks array
                var webhooksPayload = [];
                $('.webhook-entry').each(function() {
                    var u = $(this).find('.webhook-username').val();
                    var p = $(this).find('.webhook-password').val();
                    var url = $(this).find('.webhook-url').val();

                    webhooksPayload.push({
                        "channel": {
                            "type": "HTTPS",
                            "password": p,
                            "username": u,
                            "url": url
                        },
                        "events": webhook_events
                    });
                });

                // Environment URLs
                var tokenUrl, webhookHost;
                if(env == "PROD"){
                    tokenUrl = "https://api.phonepe.com/apis/identity-manager/v1/oauth/token";
                    webhookHost = "https://api.phonepe.com/apis/pg/config/v1/webhook";
                } else {
                    tokenUrl ="https://api-preprod.phonepe.com/apis/pg-sandbox/v1/oauth/token";
                    webhookHost = "https://api-preprod.phonepe.com/apis/pg-sandbox/config/v1/webhook";
                }

                // Execute the Config process
                webhookConfig();

                function webhookConfig(){
                    var settings = {
                        "url": tokenUrl,
                        "method": "POST",
                        "timeout": 0,
                        "headers": {
                            "Content-Type": "application/x-www-form-urlencoded",
                            "Authorization": "Basic Y19vbWFpYjAzcWZweGJ3MXdrZjFhMG5iODlnMmx2Y3I4NzpzXzZ5ZTBxM2s2NG1wczJwNjJna3libTlzeXo3NGZkcTkx",
                        },
                        "data": {
                            "client_id": clientId,
                            "client_version": clientVersion,
                            "client_secret": clientSecret,
                            "grant_type": "client_credentials"
                        }
                    };

                    $.ajax(settings).done(function(response) {
                        var webhook_set = {
                            "url": webhookHost,
                            "method": "POST",
                            "timeout": 0,
                            "headers": {
                                "Content-Type": "application/json",
                                "authorization": "O-Bearer " + response.access_token
                            },
                            // Send the dynamically built array instead of a single hardcoded object
                            "data": JSON.stringify({
                                "webhooks": webhooksPayload
                            }),
                        };
                        
                        $.ajax(webhook_set).done(function (response) {
                            if(response.code){
                                alert(response.code);
                            } else {
                                Swal.fire({ title: "Success", text: "Webhooks configured successfully!", icon: "success" });
                            }
                        }).fail(function (response) {
                            alert(response.responseJSON.message);
                            console.log(response);
                        });
                        
                    }).fail(function(response) {
                        var error_code = response.responseJSON ? response.responseJSON.code : "Error";
                        if(error_code == "401"){
                           alert("Unauthorized. Kindly check your Credentials");
                        } else {
                            alert(error_code);
                        }
                    });
                } 
             });
        });
    </script>
</body>
</html>
